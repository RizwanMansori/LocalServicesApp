<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add New Service</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    Add New Service
    <a href="{{ url_for('admin') }}" class="logout-btn">Back to Admin</a>
</header>

{% if success %}
<p class="success">Service "{{ service_name }}" added successfully!</p>
{% endif %}

<form method="post" action="{{ url_for('add_service') }}">
    <input type="text" name="name" placeholder="Service Name" required>
    <input type="text" name="contact" placeholder="Service Contact Number" required>
    <button type="submit">Add Service</button>
</form>

</body>
</html>
