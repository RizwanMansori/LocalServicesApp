<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Local Services App</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"><style>

body{
font-family: Arial;
margin:0;
background:#f4f6f9;
text-align:center;
}

header{
background:#007BFF;
color:white;
padding:15px;
font-size:24px;
}

nav{
background:#333;
padding:10px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.search{
margin:20px;
}

.search input{
padding:10px;
width:250px;
}

.services{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin:20px;
}

.card{
background:white;
width:220px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card button{
background:#28a745;
border:none;
padding:8px 12px;
color:white;
border-radius:5px;
}

form{
margin:20px;
}

input,textarea{
display:block;
margin:10px auto;
padding:10px;
width:260px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

footer{
background:#222;
color:white;
padding:15px;
margin-top:30px;
}

</style></head><body><header>
Local Services App
</header><nav>
<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">Contact</a>
<a href="#">About</a>
</nav><div class="search">
<input type="text" placeholder="Search services...">
</div><h2>Available Services</h2><div class="services">{% for service in services %}

<div class="card">
<h3>{{ service.name }}</h3>
<p>Contact: {{ service.contact }}</p>
<button onclick="window.location.href='tel:{{ service.contact }}'">Call</button>
</div>{% endfor %}

</div><h2>Contact Us</h2>{% if success %}

<p>Your message has been sent!</p>
{% endif %}<form method="post" action="/contact">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" placeholder="Message" required></textarea>
<button type="submit">Send</button>
</form><a href="https://wa.me/919876543210" class="whatsapp" target="_blank">
WhatsApp
</a><footer>
© 2026 Local Services App
</footer></body>
</html>
