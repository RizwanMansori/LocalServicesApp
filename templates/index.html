<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Local Services App</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>Local Services App</header>

<h2>Available Services</h2>
<div class="services">
{% for service in services %}
  <div class="card">
    <img src="{{ url_for('static', filename='icons/' + service.name|lower + '.png') }}" alt="{{ service.name }}">
    <h3>{{ service.name }}</h3>
    <p>Contact: {{ service.contact }}</p>
  </div>
{% endfor %}
</div>

<h2>Book a Service</h2>
<form method="post" action="/booking" class="booking-form">
<input type="text" name="name" placeholder="Your Name" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<select name="service">
{% for s in services %}
  <option>{{ s.name }}</option>
{% endfor %}
</select>
<input type="text" name="address" placeholder="Your Address" required>
<button type="submit">Book Now</button>
</form>

<a href="https://wa.me/919193626374" class="whatsapp" target="_blank">WhatsApp</a>

</body>
</html>
