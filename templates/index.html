<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Local Services App</title><style>
body{
font-family: Arial;
margin:0;
background:#f4f6f9;
text-align:center;
}

header{
background:#007BFF;
color:white;
padding:15px;
font-size:24px;
}

.admin-link{
margin:10px;
display:block;
font-weight:bold;
}

.services{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin:20px;
}

.card{
background:white;
width:220px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

form{
margin:20px;
}

input,textarea,select{
display:block;
margin:10px auto;
padding:10px;
width:260px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}
</style></head><body><header>
Local Services App
</header><a href="/admin" class="admin-link">Open Admin Panel</a>

<h2>Available Services</h2><div class="services">{% for service in services %}

<div class="card">
<h3>{{ service.name }}</h3>
<p>Contact: {{ service.contact }}</p>
</div>{% endfor %}

</div><h2>Contact Us</h2>{% if success %}

<p>Your message has been sent!</p>
{% endif %}<form method="post" action="/contact">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" placeholder="Message" required></textarea>
<button type="submit">Send</button>
</form><h2>Book a Service</h2><form method="post" action="/booking"><input type="text" name="name" placeholder="Your Name" required><input type="tel" name="phone" placeholder="Phone Number" required><select name="service">
<option>Electrician</option>
<option>Plumber</option>
<option>Carpenter</option>
<option>AC Repair</option>
</select><input type="text" name="address" placeholder="Your Address" required><button type="submit">Book Now</button>

</form><a href="https://wa.me/919193626374" class="whatsapp" target="_blank">
WhatsApp
</a></body>
</html>
