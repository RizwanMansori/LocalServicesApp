<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Local Services App</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"><style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

.services{
display:flex;
justify-content:center;
gap:20px;
margin:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:200px;
}

.card h3{
margin:10px 0;
}

form{
margin-top:20px;
}

input,textarea{
display:block;
margin:10px auto;
padding:10px;
width:250px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}
</style></head><body><h1>Welcome to Local Services App</h1><h2>Available Services</h2><div class="services">{% for service in services %}

<div class="card">
<h3>{{ service.name }}</h3>
<p>Contact: {{ service.contact }}</p>
</div>
{% endfor %}</div><h2>Contact Us</h2>{% if success %}

<p>Your message has been sent!</p>
{% endif %}<form method="post" action="/contact">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" placeholder="Message" required></textarea>
<button type="submit">Send</button>
</form><a href="https://wa.me/919193626374" class="whatsapp" target="_blank">
WhatsApp
</a></body>
</html>
