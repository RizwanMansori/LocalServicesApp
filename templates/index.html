<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Services App</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
    <h1>Local Services App</h1>
</header>

<section class="services-section">
    <h2>Our Services</h2>
    <div class="cards-container">
        {% for service in services %}
        <div class="service-card">
            <img src="{{ url_for('static', filename='icons/' + service.name|lower + '.png') }}" alt="{{ service.name }}">
            <h3>{{ service.name }}</h3>
            <p>Contact: {{ service.contact }}</p>
            <form action="/booking" method="POST">
                <input type="hidden" name="service" value="{{ service.name }}">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="text" name="phone" placeholder="Phone" required>
                <input type="text" name="address" placeholder="Address" required>
                <button type="submit">Book Now</button>
            </form>
        </div>
        {% endfor %}
    </div>
</section>

{% if booking_success %}
<div class="success-message">Booking successfully sent!</div>
{% endif %}

</body>
</html>
