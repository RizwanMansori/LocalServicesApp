<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#007BFF;
color:white;
}
</style>
</head>

<body>

<h1>Admin Panel - Bookings</h1>

<table>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Service</th>
<th>Address</th>
</tr>

{% for b in bookings %}

<tr>
<td>{{ b.name }}</td>
<td>{{ b.phone }}</td>
<td>{{ b.service }}</td>
<td>{{ b.address }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
