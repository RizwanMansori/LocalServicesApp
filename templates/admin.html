<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>
<body style="font-family:Arial;text-align:center">

<h1>Admin Panel - Bookings</h1>

<table border="1" style="margin:auto">

<tr>
<th>Name</th>
<th>Phone</th>
<th>Service</th>
<th>Address</th>
</tr>

{% for b in bookings %}

<tr>
<td>{{ b[0] }}</td>
<td>{{ b[1] }}</td>
<td>{{ b[2] }}</td>
<td>{{ b[3] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
